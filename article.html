<style>
:root {
  --obsidian:   #0D0D0D;
  --warm-black: #1A1714;
  --copper:     #C17F59;
  --copper-light: #D4A07A;
  --signal:     #E85D3A;
  --off-white:  #F2F0EB;
  --concrete:   #8A8A8A;
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body {
  background: var(--obsidian);
  color: var(--off-white);
  font-family: 'DM Sans', sans-serif;
  font-weight: 300;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

/* ── NAV ── */
.site-nav {
  position:fixed; top:0; left:0; right:0; z-index:9999;
  padding:0 48px; height:64px;
  display:flex; align-items:center; justify-content:space-between;
  background:rgba(13,13,13,0.92);
  backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid rgba(242,240,235,0.04);
}
.site-nav-brand { display:flex; align-items:center; gap:14px; text-decoration:none; }
.site-nav-name  { font-family:'Thunder',sans-serif; font-weight:700; font-size:16px; letter-spacing:1px; color:#F2F0EB; }
.site-nav-links { display:flex; align-items:center; gap:32px; }
.site-nav-links a { font-family:'Space Mono',monospace; font-size:10px; letter-spacing:3px; text-transform:uppercase; text-decoration:none; color:#8A8A8A; transition:color .3s; }
.site-nav-links a:hover, .site-nav-links a.active { color:#C17F59; }
.site-nav-btn { display:none; background:none; border:none; cursor:pointer; padding:8px; }
.site-nav-btn span { display:block; width:22px; height:2px; background:#F2F0EB; margin:5px 0; }
@media(max-width:768px){
  .site-nav { padding:0 24px; }
  .site-nav-links { display:none; position:fixed; top:64px; left:0; right:0; background:rgba(13,13,13,.96); flex-direction:column; padding:24px; gap:20px; }
  .site-nav-links.open { display:flex; }
  .site-nav-btn { display:block; }
}

/* ── PROGRESS BAR ── */
.progress-bar {
  position:fixed; top:64px; left:0; height:2px;
  background:var(--copper); z-index:9998;
  width:0%; transition:width 0.1s linear;
}

/* ── ARTICLE SHELL ── */
.article-wrap {
  max-width: 720px;
  margin: 0 auto;
  padding: 120px 48px 100px;
}

/* ── BACK LINK ── */
.back-link {
  display:inline-flex; align-items:center; gap:8px;
  font-family:'Space Mono',monospace; font-size:9px;
  letter-spacing:3px; text-transform:uppercase;
  color:var(--concrete); text-decoration:none;
  margin-bottom:48px; transition:color 0.2s;
}
.back-link:hover { color:var(--copper); }
.back-link::before { content:'←'; }

/* ── META ── */
.article-meta {
  display:flex; align-items:center; gap:16px; flex-wrap:wrap;
  margin-bottom:32px;
}
.meta-badge {
  font-family:'Space Mono',monospace; font-size:8px;
  letter-spacing:3px; text-transform:uppercase;
  padding:4px 10px; background:var(--copper); color:var(--obsidian); font-weight:700;
}
.meta-issue {
  font-family:'Space Mono',monospace; font-size:9px;
  letter-spacing:2px; text-transform:uppercase; color:var(--concrete);
}
.meta-date {
  font-family:'Space Mono',monospace; font-size:9px;
  letter-spacing:2px; text-transform:uppercase; color:var(--concrete);
}
.meta-read {
  font-family:'Space Mono',monospace; font-size:9px;
  letter-spacing:2px; text-transform:uppercase; color:var(--concrete);
}

/* ── TITLE ── */
.article-title {
  font-family:'Thunder',sans-serif; font-weight:700;
  font-size:clamp(48px,7vw,88px); letter-spacing:1px;
  line-height:0.9; color:var(--off-white); margin-bottom:24px;
}

/* ── EXCERPT ── */
.article-excerpt {
  font-size:18px; font-weight:300; color:var(--concrete);
  line-height:1.7; margin-bottom:40px;
  padding-bottom:40px; border-bottom:1px solid rgba(193,127,89,0.15);
}

/* ── COVER IMAGE ── */
.article-cover {
  width:100%; aspect-ratio:16/9; object-fit:cover;
  margin-bottom:48px; display:block;
}

/* ── BODY CONTENT ── */
.article-body {
  font-size:17px; font-weight:300; line-height:1.85;
  color:rgba(242,240,235,0.85);
}
.article-body p { margin-bottom:24px; }
.article-body h2 {
  font-family:'Thunder',sans-serif; font-weight:700;
  font-size:clamp(28px,4vw,44px); letter-spacing:2px;
  color:var(--off-white); line-height:1.05;
  margin:52px 0 20px; padding-top:8px;
  border-top:1px solid rgba(193,127,89,0.15);
}
.article-body h3 {
  font-family:'DM Sans',sans-serif; font-weight:700;
  font-size:20px; color:var(--off-white);
  margin:36px 0 14px; letter-spacing:0.5px;
}
.article-body ul, .article-body ol {
  padding-left:0; margin-bottom:24px; list-style:none;
}
.article-body ul li, .article-body ol li {
  padding:8px 0 8px 24px; position:relative;
  border-bottom:1px solid rgba(242,240,235,0.04);
  color:rgba(242,240,235,0.75);
}
.article-body ul li::before {
  content:'→'; position:absolute; left:0; color:var(--copper); font-size:13px;
}
.article-body ol { counter-reset:item; }
.article-body ol li { counter-increment:item; }
.article-body ol li::before {
  content:counter(item); position:absolute; left:0;
  font-family:'Space Mono',monospace; font-size:11px;
  color:var(--copper); font-weight:700;
}
.article-body blockquote {
  border-left:3px solid var(--copper);
  padding:20px 28px; margin:36px 0;
  background:rgba(193,127,89,0.05);
  font-size:18px; font-style:italic;
  color:rgba(242,240,235,0.7); line-height:1.7;
}
.article-body strong { color:var(--off-white); font-weight:700; }
.article-body em { color:var(--copper-light); }
.article-body a { color:var(--copper); text-decoration:none; border-bottom:1px solid rgba(193,127,89,0.3); transition:border-color 0.2s; }
.article-body a:hover { border-color:var(--copper); }
.article-body hr { border:none; border-top:1px solid rgba(193,127,89,0.15); margin:48px 0; }

/* ── TAGS ── */
.article-tags {
  display:flex; gap:8px; flex-wrap:wrap;
  margin-top:52px; padding-top:32px;
  border-top:1px solid rgba(193,127,89,0.12);
}
.article-tag {
  font-family:'Space Mono',monospace; font-size:8px;
  letter-spacing:2px; text-transform:uppercase;
  color:var(--concrete); padding:5px 12px;
  border:1px solid rgba(242,240,235,0.08);
}

/* ── SUBSCRIBE CTA ── */
.subscribe-cta {
  margin-top:64px; padding:40px 36px;
  background:rgba(193,127,89,0.05);
  border:1px solid rgba(193,127,89,0.15);
  text-align:center;
}
.subscribe-cta-eyebrow {
  font-family:'Space Mono',monospace; font-size:9px;
  letter-spacing:4px; text-transform:uppercase;
  color:var(--copper); margin-bottom:16px;
}
.subscribe-cta-title {
  font-family:'Thunder',sans-serif; font-weight:700;
  font-size:36px; letter-spacing:3px;
  color:var(--off-white); line-height:1; margin-bottom:12px;
}
.subscribe-cta-desc {
  font-size:14px; color:var(--concrete); line-height:1.65; margin-bottom:24px;
}
.cta-form { display:flex; gap:0; max-width:400px; margin:0 auto; }
.cta-input {
  flex:1; background:rgba(242,240,235,0.05);
  border:1px solid rgba(242,240,235,0.1); border-right:none;
  padding:13px 16px; font-family:'DM Sans',sans-serif; font-size:14px;
  color:var(--off-white); outline:none; transition:border-color 0.3s;
}
.cta-input::placeholder { color:var(--concrete); }
.cta-input:focus { border-color:var(--copper); }
.cta-btn {
  background:var(--copper); color:var(--obsidian);
  font-family:'Space Mono',monospace; font-size:9px;
  font-weight:700; letter-spacing:2px; text-transform:uppercase;
  padding:13px 20px; border:none; cursor:pointer; white-space:nowrap;
  transition:background 0.3s;
}
.cta-btn:hover { background:var(--copper-light); }
.cta-success {
  display:none; font-family:'Space Mono',monospace;
  font-size:10px; letter-spacing:2px; text-transform:uppercase;
  color:var(--copper); margin-top:16px;
}

/* ── NEXT ISSUES ── */
.more-issues {
  max-width:720px; margin:0 auto; padding:0 48px 80px;
}
.more-label {
  font-family:'Space Mono',monospace; font-size:9px;
  letter-spacing:4px; text-transform:uppercase;
  color:var(--copper); margin-bottom:24px;
  display:flex; align-items:center; gap:12px;
}
.more-label::before { content:''; width:28px; height:1px; background:var(--copper); }
.more-grid { display:grid; grid-template-columns:1fr 1fr; gap:2px; }
.more-card {
  background:var(--warm-black); text-decoration:none; color:inherit;
  padding:28px 24px; display:block;
  border:1px solid rgba(193,127,89,0); transition:border-color 0.25s, background 0.25s;
  position:relative; overflow:hidden;
}
.more-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:2px;
  background:var(--copper); transform:scaleX(0); transform-origin:left; transition:transform 0.3s;
}
.more-card:hover { background:#1F1C18; border-color:rgba(193,127,89,0.15); }
.more-card:hover::before { transform:scaleX(1); }
.more-card-num {
  font-family:'Space Mono',monospace; font-size:9px;
  letter-spacing:2px; color:var(--concrete); margin-bottom:10px;
}
.more-card-title {
  font-family:'Thunder',sans-serif; font-weight:700;
  font-size:22px; letter-spacing:2px;
  color:var(--off-white); line-height:1.05; margin-bottom:8px;
}
.more-card-excerpt {
  font-size:12px; font-weight:300; color:var(--concrete); line-height:1.6;
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
}

/* ── STATES ── */
.not-found {
  max-width:720px; margin:0 auto; padding:160px 48px;
  text-align:center;
}
.not-found-title {
  font-family:'Thunder',sans-serif; font-weight:700;
  font-size:80px; letter-spacing:4px;
  color:rgba(242,240,235,0.08); margin-bottom:16px;
}
.not-found-sub {
  font-family:'Space Mono',monospace; font-size:10px;
  letter-spacing:3px; text-transform:uppercase; color:var(--concrete);
  margin-bottom:28px;
}
.skeleton {
  background:linear-gradient(90deg,rgba(255,255,255,0.03) 25%,rgba(255,255,255,0.07) 50%,rgba(255,255,255,0.03) 75%);
  background-size:200% 100%; animation:shimmer 1.5s infinite; border-radius:2px;
}
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

/* ── FOOTER ── */
footer {
  background:var(--warm-black);
  border-top:1px solid rgba(242,240,235,0.04);
  padding:48px 60px;
}
.footer-inner {
  max-width:1200px; margin:0 auto;
  display:flex; justify-content:space-between; align-items:center; gap:40px; flex-wrap:wrap;
}
.footer-brand { font-family:'Thunder',sans-serif; font-weight:700; font-size:14px; letter-spacing:1px; color:rgba(242,240,235,0.15); }
.footer-links { display:flex; gap:24px; flex-wrap:wrap; }
.footer-link { font-family:'Space Mono',monospace; font-size:9px; letter-spacing:2px; text-transform:uppercase; color:var(--concrete); text-decoration:none; transition:color 0.3s; }
.footer-link:hover { color:var(--off-white); }
.footer-legal { font-family:'Space Mono',monospace; font-size:9px; letter-spacing:1px; color:rgba(242,240,235,0.12); }

@media(max-width:768px){
  .article-wrap, .more-issues { padding-left:24px; padding-right:24px; }
  .more-grid { grid-template-columns:1fr; }
  .cta-form { flex-direction:column; }
  .cta-input { border-right:1px solid rgba(242,240,235,0.1); border-bottom:none; }
  footer { padding:40px 24px; }
  .footer-inner { flex-direction:column; gap:24px; text-align:center; }
}
</style>

<script>
const SUPABASE_URL  = 'https://riqdcirsmckubkdfbtoj.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJpcWRjaXJzbWNrdWJrZGZidG9qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMTE5MzQsImV4cCI6MjA4Nzg4NzkzNH0.m8mLPxFeOeKhMV3W4HMru9kSYIcxXfbfDRVslLCj_gM';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

const main = document.getElementById('main-content');

function formatDate(iso) {
  return new Date(iso).toLocaleDateString('en-US', { month:'long', day:'numeric', year:'numeric' });
}

// ── READ PROGRESS ──
window.addEventListener('scroll', () => {
  const body   = document.body;
  const html   = document.documentElement;
  const total  = Math.max(body.scrollHeight, html.scrollHeight) - window.innerHeight;
  const pct    = total > 0 ? (window.scrollY / total) * 100 : 0;
  document.getElementById('progress-bar').style.width = pct + '%';
});

// ── LOAD ARTICLE ──
async function loadArticle() {
  const params = new URLSearchParams(window.location.search);
  const slug   = params.get('slug');

  if (!slug) { renderNotFound(); return; }

  // Show skeleton
  main.innerHTML = `
    <div class="article-wrap">
      <div class="skeleton" style="height:12px;width:80px;margin-bottom:48px;"></div>
      <div class="skeleton" style="height:12px;width:200px;margin-bottom:24px;"></div>
      <div class="skeleton" style="height:80px;margin-bottom:20px;"></div>
      <div class="skeleton" style="height:80px;width:70%;margin-bottom:32px;"></div>
      <div class="skeleton" style="height:18px;margin-bottom:12px;"></div>
      <div class="skeleton" style="height:18px;margin-bottom:12px;"></div>
      <div class="skeleton" style="height:18px;width:85%;margin-bottom:12px;"></div>
    </div>`;

  try {
    const { data, error } = await db
      .from('newsletter_issues')
      .select('*')
      .eq('slug', slug)
      .eq('published', true)
      .single();

    if (error || !data) { renderNotFound(); return; }

    renderArticle(data);
    loadMoreIssues(data.id);

    // Update meta tags
    document.title = `${data.title} — Arise & Build`;
    document.querySelector('meta[name="description"]')?.setAttribute('content', data.excerpt || '');
    document.querySelector('meta[property="og:title"]')?.setAttribute('content', data.title);
    document.querySelector('meta[property="og:description"]')?.setAttribute('content', data.excerpt || '');
    if (data.cover_image_url) {
      document.querySelector('meta[property="og:image"]')?.setAttribute('content', data.cover_image_url);
    }

  } catch(err) {
    renderNotFound();
  }
}

function renderArticle(issue) {
  const issueNum = issue.issue_number ? `Issue #${issue.issue_number}` : '';
  const coverImg = issue.cover_image_url
    ? `<img class="article-cover" src="${issue.cover_image_url}" alt="${issue.title}" loading="lazy">`
    : '';
  const tagsHtml = (issue.tags||[]).map(t=>`<span class="article-tag">${t}</span>`).join('');

  main.innerHTML = `
    <div class="article-wrap">
      <a href="/articles.html" class="back-link">All Issues</a>

      <div class="article-meta">
        <span class="meta-badge">Arise & Build</span>
        ${issueNum ? `<span class="meta-issue">${issueNum}</span>` : ''}
        <span class="meta-date">${formatDate(issue.published_at)}</span>
        <span class="meta-read">${issue.read_time_minutes || 5} min read</span>
      </div>

      <h1 class="article-title">${issue.title}</h1>

      ${issue.excerpt ? `<div class="article-excerpt">${issue.excerpt}</div>` : ''}
      ${coverImg}

      <div class="article-body">${issue.body_html || ''}</div>

      ${tagsHtml ? `<div class="article-tags">${tagsHtml}</div>` : ''}

      <div class="subscribe-cta">
        <div class="subscribe-cta-eyebrow">Arise & Build</div>
        <div class="subscribe-cta-title">GET THE NEXT ONE<span style="color:var(--copper)">.</span></div>
        <p class="subscribe-cta-desc">Weekly essays on leadership, systems, and building what doesn't exist. Delivered direct. No platform in the way.</p>
        <div id="cta-form-area">
          <div class="cta-form">
            <input type="email" class="cta-input" id="cta-email" placeholder="Your email address">
            <button class="cta-btn" id="cta-btn">Subscribe</button>
          </div>
          <div class="subscribe-note" style="font-family:'Space Mono',monospace;font-size:9px;letter-spacing:1px;color:rgba(138,138,138,0.5);text-align:center;margin-top:12px;">No spam. Unsubscribe anytime.</div>
        </div>
        <div class="cta-success" id="cta-success">✦ &nbsp; You're in. Welcome to the builders.</div>
      </div>
    </div>`;

  // Wire up subscribe
  const ctaBtn   = document.getElementById('cta-btn');
  const ctaInput = document.getElementById('cta-email');

  ctaBtn.addEventListener('click', async () => {
    const email = ctaInput.value.trim();
    if (!email || !email.includes('@')) { ctaInput.style.borderColor='var(--signal)'; ctaInput.focus(); return; }
    ctaInput.style.borderColor = '';
    ctaBtn.disabled = true; ctaBtn.textContent = '...';
    try {
      await db.from('newsletter_subscribers').insert([{ email: email.toLowerCase(), source: 'newsletter_section' }]);
    } catch(e) {}
    document.getElementById('cta-form-area').style.display = 'none';
    document.getElementById('cta-success').style.display = 'block';
  });
  ctaInput.addEventListener('keydown', e => { if(e.key==='Enter') ctaBtn.click(); });
}

async function loadMoreIssues(currentId) {
  try {
    const { data } = await db
      .from('newsletter_issues')
      .select('slug,title,excerpt,issue_number,published_at')
      .eq('published', true)
      .neq('id', currentId)
      .order('published_at', { ascending:false })
      .limit(2);

    if (!data || data.length === 0) return;

    const grid = document.getElementById('more-grid');
    grid.innerHTML = data.map(issue => `
      <a href="/article.html?slug=${encodeURIComponent(issue.slug)}" class="more-card">
        <div class="more-card-num">${issue.issue_number ? `Issue #${issue.issue_number}` : 'Arise & Build'}</div>
        <div class="more-card-title">${issue.title}</div>
        <div class="more-card-excerpt">${issue.excerpt || ''}</div>
      </a>`).join('');

    document.getElementById('more-issues').style.display = 'block';
  } catch(e) {}
}

function renderNotFound() {
  main.innerHTML = `
    <div class="not-found">
      <div class="not-found-title">404.</div>
      <div class="not-found-sub">Issue not found</div>
