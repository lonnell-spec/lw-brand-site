<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lonnell D. Williams — Signature</title>
<meta name="description" content="Lonnell D. Williams — Consultant, Author, Speaker. ldw.build" />
<meta property="og:title" content="Lonnell D. Williams" />
<meta property="og:description" content="Consultant · Author · Speaker" />
<meta property="og:type" content="website" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=Space+Mono:wght@400;700&display=swap"

<style>
  :root {
    --obsidian:   #0D0D0D;
    --warm-black: #1A1714;
    --copper:     #C17F59;
    --copper-dim: rgba(193, 127, 89, 0.35);
    --signal:     #E85D3A;
    --off-white:  #F2F0EB;
    --concrete:   #8A8A8A;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%;
    min-height: 100%;
    background: var(--obsidian);
    font-family: 'DM Sans', sans-serif;
    color: var(--off-white);
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px;
    min-height: 100vh;
    background:
      radial-gradient(circle at 30% 40%, rgba(193, 127, 89, 0.08) 0%, transparent 50%),
      radial-gradient(circle at 70% 60%, rgba(232, 93, 58, 0.04) 0%, transparent 50%),
      var(--obsidian);
  }

  .card {
    position: relative;
    width: 100%;
    max-width: 720px;
    background: var(--warm-black);
    border: 1px solid rgba(193, 127, 89, 0.15);
    padding: 56px 64px;
    box-shadow:
      0 40px 80px rgba(0, 0, 0, 0.5),
      0 0 0 1px rgba(193, 127, 89, 0.06) inset;
    overflow: hidden;
  }

  .card::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg,
      transparent 0%,
      var(--copper) 20%,
      var(--signal) 50%,
      var(--copper) 80%,
      transparent 100%);
    opacity: 0;
    animation: ruleFade 1.2s 0.2s ease-out forwards;
  }

  .card::after {
    content: "";
    position: absolute;
    bottom: -120px; left: -120px;
    width: 320px; height: 320px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(193, 127, 89, 0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  /* ── Signature: actual vectorized handwriting ──────────── */
  .signature-wrap {
    margin-bottom: 28px;
    line-height: 0;
    /* Mask-based reveal: sweeps left to right like being written */
    -webkit-mask-image: linear-gradient(
      to right,
      #000 0%,
      #000 var(--reveal, 0%),
      transparent var(--reveal, 0%),
      transparent 100%
    );
    mask-image: linear-gradient(
      to right,
      #000 0%,
      #000 var(--reveal, 0%),
      transparent var(--reveal, 0%),
      transparent 100%
    );
    animation: revealSignature 2.8s 0.4s cubic-bezier(0.65, 0, 0.35, 1) forwards;
  }

  .signature-svg {
    width: 100%;
    max-width: 520px;
    height: auto;
    display: block;
    color: var(--off-white);
  }

  @keyframes revealSignature {
    from { --reveal: 0%; }
    to   { --reveal: 100%; }
  }

  /* Fallback for browsers that don't support @property */
  @supports not (background: paint(something)) {
    .signature-wrap {
      opacity: 0;
      animation: fadeInSig 1.8s 0.4s ease-out forwards;
    }
    @keyframes fadeInSig {
      from { opacity: 0; clip-path: inset(0 100% 0 0); }
      to   { opacity: 1; clip-path: inset(0 0 0 0); }
    }
  }

  /* More robust: use clip-path approach which has universal support */
  .signature-wrap {
    clip-path: inset(0 100% 0 0);
    animation: clipSignature 2.8s 0.4s cubic-bezier(0.65, 0, 0.35, 1) forwards;
    -webkit-mask-image: none;
    mask-image: none;
  }

  @keyframes clipSignature {
    to { clip-path: inset(0 0 0 0); }
  }

  /* ── Copper hairline divider ──────────────────────────── */
  .divider {
    width: 48px;
    height: 2px;
    background: var(--copper);
    margin-bottom: 24px;
    transform-origin: left center;
    transform: scaleX(0);
    animation: expandLine 0.8s 3.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }

  /* ── Name (printed) ────────────────────────────────────── */
  .name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(28px, 4.2vw, 38px);
    font-weight: 400;
    letter-spacing: 0.08em;
    color: var(--off-white);
    margin-bottom: 8px;
    opacity: 0;
    transform: translateY(12px);
    animation: fadeUp 0.9s 3.4s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }

  /* ── Credentials ───────────────────────────────────────── */
  .credentials {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--copper);
    margin-bottom: 28px;
    opacity: 0;
    transform: translateY(12px);
    animation: fadeUp 0.9s 3.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }

  .credentials .sep {
    color: var(--concrete);
    margin: 0 10px;
    font-weight: 300;
  }

  /* ── Contact row ──────────────────────────────────────── */
  .contact {
    display: flex;
    flex-wrap: wrap;
    gap: 28px;
    padding-top: 20px;
    border-top: 1px solid rgba(242, 240, 235, 0.08);
    opacity: 0;
    transform: translateY(12px);
    animation: fadeUp 0.9s 3.85s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }

  .contact-item {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.05em;
    color: var(--off-white);
    text-decoration: none;
    transition: color 0.2s ease;
  }

  .contact-item:hover { color: var(--copper); }

  .contact-item .label {
    font-family: 'Space Mono', monospace;
    color: var(--copper);
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.2em;
    padding: 3px 6px;
    border: 1px solid var(--copper-dim);
  }

  /* ── Newsletter ping ──────────────────────────────────── */
  .newsletter {
    margin-top: 20px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--concrete);
    opacity: 0;
    transform: translateY(8px);
    animation: fadeUp 0.9s 4.1s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }

  .newsletter a {
    color: var(--copper);
    text-decoration: none;
    transition: color 0.2s ease;
  }

  .newsletter a:hover { color: var(--signal); }

  .newsletter .arrow {
    display: inline-block;
    margin-right: 6px;
    color: var(--copper);
  }

  /* ── Animations ───────────────────────────────────────── */
  @keyframes ruleFade {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  @keyframes expandLine {
    to { transform: scaleX(1); }
  }

  @keyframes fadeUp {
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  /* ── Replay control ───────────────────────────────────── */
  .replay {
    position: absolute;
    bottom: 16px; right: 16px;
    background: transparent;
    border: 1px solid rgba(193, 127, 89, 0.25);
    color: var(--concrete);
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    padding: 6px 12px;
    cursor: pointer;
    opacity: 0;
    transition: all 0.3s ease;
    text-transform: uppercase;
  }

  .card:hover .replay { opacity: 0.7; }
  .replay:hover { color: var(--copper); border-color: var(--copper); opacity: 1; }

  /* ── Responsive ───────────────────────────────────────── */
  @media (max-width: 640px) {
    body { padding: 20px; }
    .card { padding: 36px 28px; }
    .contact { gap: 16px; flex-direction: column; }
    .name { font-size: 26px; }
    .signature-svg { max-width: 100%; }
  }

  @media (prefers-reduced-motion: reduce) {
    .signature-wrap { animation: none !important; clip-path: none !important; }
    .card::before,
    .divider,
    .name,
    .credentials,
    .contact,
    .newsletter {
      animation: none !important;
      opacity: 1 !important;
      transform: none !important;
    }
  }
</style>
</head>
