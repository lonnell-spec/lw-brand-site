<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LW Brand Site</title>
</head>
<body>
    <h1>Welcome to LW Brand Site</h1>
    
    <script>
        // Sync ActiveCampaign function
        async function syncActivecampaign(formData) {
            try {
                const response = await fetch('https://your-api-endpoint.com/sync', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + SUPABASE_ANON_KEY },
                    body: JSON.stringify(formData)
                });
                
                if (!response.ok) {
                    throw new Error('Sync failed');
                }
                
                return await response.json();
            } catch (error) {
                console.error('Error syncing with ActiveCampaign:', error);
                throw error;
            }
        }
    </script>
</body>
</html>
