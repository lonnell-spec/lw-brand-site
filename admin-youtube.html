<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube — Admin | LDW</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://api.fontshare.com/v2/css?f[]=thunder@800,700,600&display=swap" rel="stylesheet">
<style>
:root {
  --obsidian: #0D0D0D; --warm-black: #1A1714; --off-white: #F2F0EB;
  --concrete: #8A8A8A; --copper: #C17F59; --copper-light: #D4956A;
  --signal: #E85D3A; --signal-green: #00E676;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--obsidian); color: var(--off-white); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

/* ── NAV ── */
.site-nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 0 48px; height: 64px; background: rgba(13,13,13,0.92); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(242,240,235,0.06); }
.site-nav-brand { display: flex; align-items: center; gap: 12px; text-decoration: none; color: var(--off-white); }
.site-nav-name { font-family: 'Thunder', sans-serif; font-weight: 700; font-size: 18px; letter-spacing: 1px; }
.site-nav-links { display: flex; gap: 32px; align-items: center; }
.site-nav-links a { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--concrete); text-decoration: none; transition: color 0.3s; }
.site-nav-links a:hover { color: var(--off-white); }

/* ── LAYOUT ── */
.admin-sub { padding: 64px 0 0; min-height: 100vh; }
.admin-sub-header { padding: 48px 48px 32px; border-bottom: 1px solid rgba(242,240,235,0.06); }
.admin-sub-back { display: inline-flex; align-items: center; gap: 8px; font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--copper); text-decoration: none; margin-bottom: 24px; transition: color 0.3s; }
.admin-sub-back:hover { color: var(--copper-light); }
.admin-sub-eyebrow { font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: 5px; text-transform: uppercase; color: var(--copper); margin-bottom: 12px; }
.admin-sub-title { font-family: 'Thunder', sans-serif; font-weight: 700; font-size: 42px; letter-spacing: 1px; line-height: 1; }
.admin-sub-title .accent { color: var(--copper); }
.admin-content { padding: 40px 48px 80px; max-width: 1200px; }
.section-label { font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: 5px; text-transform: uppercase; color: var(--copper); margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid rgba(193,127,89,0.2); }

/* ── ADD VIDEO FORM ── */
.add-video-box {
  background: var(--warm-black);
  border: 1px solid rgba(193,127,89,0.25);
  padding: 36px 40px;
  margin-bottom: 48px;
  position: relative;
}
.add-video-box::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: var(--copper); opacity: 0.6;
}
.add-form-label { font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: 4px; text-transform: uppercase; color: var(--copper); margin-bottom: 8px; display: block; }
.add-form-desc { font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 300; color: var(--concrete); margin-bottom: 24px; }

.add-url-row { display: flex; gap: 12px; align-items: stretch; }
.add-url-input {
  flex: 1;
  background: rgba(13,13,13,0.8);
  border: 1px solid rgba(242,240,235,0.1);
  color: var(--off-white);
  font-family: 'DM Sans', sans-serif; font-size: 14px;
  padding: 13px 16px;
  outline: none; transition: border-color 0.2s;
}
.add-url-input::placeholder { color: var(--concrete); }
.add-url-input:focus { border-color: rgba(193,127,89,0.5); }

.btn-fetch {
  font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
  background: var(--copper); color: var(--obsidian);
  border: none; padding: 13px 28px; cursor: pointer; transition: opacity 0.2s; white-space: nowrap;
}
.btn-fetch:hover { opacity: 0.85; }
.btn-fetch:disabled { opacity: 0.45; cursor: not-allowed; }

/* ── PREVIEW ── */
.video-preview {
  margin-top: 24px;
  display: none;
  background: rgba(13,13,13,0.6);
  border: 1px solid rgba(242,240,235,0.08);
}
.video-preview.visible { display: block; }
.preview-inner { display: grid; grid-template-columns: 200px 1fr; gap: 0; }
.preview-thumb { position: relative; overflow: hidden; }
.preview-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; min-height: 113px; }
.preview-info { padding: 20px 24px; }
.preview-title { font-family: 'Thunder', sans-serif; font-weight: 700; font-size: 20px; letter-spacing: 0.5px; color: var(--off-white); margin-bottom: 8px; line-height: 1.2; }
.preview-channel { font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: var(--copper); margin-bottom: 16px; }
.preview-fields { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 16px; }
.preview-field label { font-family: 'Space Mono', monospace; font-size: 8px; letter-spacing: 3px; text-transform: uppercase; color: var(--concrete); display: block; margin-bottom: 4px; }
.preview-field select,
.preview-field input[type="date"],
.preview-field input[type="number"] {
  width: 100%;
  background: rgba(13,13,13,0.8);
  border: 1px solid rgba(242,240,235,0.1);
  color: var(--off-white); font-family: 'DM Sans', sans-serif; font-size: 13px;
  padding: 8px 10px; outline: none; cursor: pointer;
  transition: border-color 0.2s;
}
.preview-field select:focus,
.preview-field input:focus { border-color: rgba(193,127,89,0.4); }
.preview-field select option { background: #1A1714; }

.desc-field { margin-bottom: 16px; }
.desc-field label { font-family: 'Space Mono', monospace; font-size: 8px; letter-spacing: 3px; text-transform: uppercase; color: var(--concrete); display: block; margin-bottom: 4px; }
.desc-field textarea {
  width: 100%; background: rgba(13,13,13,0.8);
  border: 1px solid rgba(242,240,235,0.1); color: var(--off-white);
  font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 300;
  padding: 10px 12px; outline: none; resize: vertical; min-height: 64px;
  transition: border-color 0.2s; box-sizing: border-box;
}
.desc-field textarea:focus { border-color: rgba(193,127,89,0.4); }

.preview-toggle-row { display: flex; gap: 20px; align-items: center; margin-bottom: 16px; }
.toggle-item { display: flex; align-items: center; gap: 8px; cursor: pointer; }
.toggle-item input[type="checkbox"] { accent-color: var(--copper); width: 14px; height: 14px; cursor: pointer; }
.toggle-item span { font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--concrete); }

.preview-actions { display: flex; gap: 10px; }
.btn-insert {
  font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
  background: rgba(0,230,118,0.12); color: var(--signal-green);
  border: 1px solid rgba(0,230,118,0.35); padding: 10px 20px; cursor: pointer; transition: opacity 0.2s;
}
.btn-insert:hover { opacity: 0.8; }
.btn-insert:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-cancel {
  font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
  background: transparent; color: var(--concrete); border: 1px solid rgba(138,138,138,0.2);
  padding: 10px 18px; cursor: pointer; transition: all 0.2s;
}
.btn-cancel:hover { color: var(--off-white); border-color: rgba(242,240,235,0.3); }

/* ── VIDEO TABLE ── */
.video-count { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--concrete); letter-spacing: 2px; margin-bottom: 16px; }
.filter-bar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
.filter-btn { font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; background: transparent; color: var(--concrete); border: 1px solid rgba(138,138,138,0.2); padding: 7px 14px; cursor: pointer; transition: all 0.2s; }
.filter-btn:hover, .filter-btn.active { color: var(--copper); border-color: rgba(193,127,89,0.4); }

.video-card { background: var(--warm-black); border: 1px solid rgba(242,240,235,0.06); margin-bottom: 12px; transition: border-color 0.2s; display: grid; grid-template-columns: 160px 1fr auto; gap: 0; }
.video-card:hover { border-color: rgba(193,127,89,0.2); }

.vc-thumb { position: relative; overflow: hidden; }
.vc-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; min-height: 90px; }
.vc-thumb .vc-category {
  position: absolute; bottom: 6px; left: 6px;
  font-family: 'Space Mono', monospace; font-size: 7px; letter-spacing: 2px; text-transform: uppercase;
  background: rgba(13,13,13,0.85); color: var(--copper); padding: 3px 7px;
}

.vc-info { padding: 16px 20px; min-width: 0; }
.vc-title { font-family: 'Thunder', sans-serif; font-weight: 700; font-size: 18px; letter-spacing: 0.5px; color: var(--off-white); margin-bottom: 6px; line-height: 1.2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.vc-meta { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 8px; }
.vc-meta span { font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: 1px; text-transform: uppercase; color: var(--concrete); }
.vc-meta a { color: var(--copper); text-decoration: none; }
.vc-meta a:hover { text-decoration: underline; }

.vc-actions { padding: 16px 20px; display: flex; flex-direction: column; gap: 8px; align-items: flex-end; justify-content: center; }
.vis-badge { font-family: 'Space Mono', monospace; font-size: 8px; letter-spacing: 2px; text-transform: uppercase; padding: 4px 10px; cursor: pointer; border: none; transition: all 0.2s; }
.vis-badge.visible { background: rgba(0,230,118,0.1); color: var(--signal-green); border: 1px solid rgba(0,230,118,0.3); }
.vis-badge.hidden { background: rgba(138,138,138,0.08); color: var(--concrete); border: 1px solid rgba(138,138,138,0.2); }
.feat-badge { font-family: 'Space Mono', monospace; font-size: 8px; letter-spacing: 2px; text-transform: uppercase; padding: 4px 10px; cursor: pointer; border: none; transition: all 0.2s; }
.feat-badge.featured { background: rgba(193,127,89,0.12); color: var(--copper); border: 1px solid rgba(193,127,89,0.3); }
.feat-badge.unfeatured { background: transparent; color: var(--concrete); border: 1px solid rgba(138,138,138,0.15); }

.vc-delete { font-family: 'Space Mono', monospace; font-size: 8px; letter-spacing: 2px; text-transform: uppercase; background: transparent; color: rgba(138,138,138,0.4); border: 1px solid rgba(138,138,138,0.1); padding: 4px 10px; cursor: pointer; transition: all 0.2s; }
.vc-delete:hover { color: var(--signal); border-color: rgba(232,93,58,0.3); }

/* ── EMPTY + LOADING ── */
.empty-state { text-align: center; padding: 60px 40px; }
.empty-state p { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--concrete); letter-spacing: 3px; text-transform: uppercase; }
.loading-dots { display: inline-flex; gap: 4px; }
.loading-dots span { width: 6px; height: 6px; background: var(--copper); border-radius: 50%; animation: pulse 1.2s ease-in-out infinite; }
.loading-dots span:nth-child(2) { animation-delay: 0.2s; }
.loading-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes pulse { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }

/* ── TOAST ── */
#toast { position: fixed; bottom: 32px; right: 32px; background: var(--copper); color: var(--obsidian); font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; padding: 14px 20px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 9999; }
#toast.show { opacity: 1; }
#toast.error { background: var(--signal); color: var(--off-white); }

/* ── FOOTER ── */
.admin-sub-footer { padding: 24px 48px; border-top: 1px solid rgba(242,240,235,0.06); display: flex; justify-content: space-between; align-items: center; }
.admin-sub-footer a { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--concrete); text-decoration: none; transition: color 0.3s; }
.admin-sub-footer a:hover { color: var(--off-white); }
.admin-sub-footer span { font-family: 'DM Sans', sans-serif; font-size: 12px; color: rgba(138,138,138,0.5); }

@media (max-width: 768px) {
  .site-nav { padding: 0 24px; }
  .admin-sub-header { padding: 32px 24px 24px; }
  .admin-sub-title { font-size: 32px; }
  .admin-content { padding: 24px 24px 60px; }
  .add-url-row { flex-direction: column; }
  .preview-inner { grid-template-columns: 1fr; }
  .preview-fields { grid-template-columns: 1fr 1fr; }
  .video-card { grid-template-columns: 1fr; }
  .vc-actions { flex-direction: row; flex-wrap: wrap; padding: 12px 16px; border-top: 1px solid rgba(242,240,235,0.04); }
  .admin-sub-footer { padding: 16px 24px; flex-direction: column; gap: 12px; }
}
</style>
</head>

<div class="admin-sub">

<!-- ── Supabase (self-hosted UMD) ── -->
<script src="/supabase.js"></script>
<script>
// ── Supabase client ────────────────────────────────────────────────
const db = supabase.createClient(
  'https://riqdcirsmckubkdfbtoj.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJpcWRjaXJzbWNrdWJrZGZidG9qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMTE5MzQsImV4cCI6MjA4Nzg4NzkzNH0.m8mLPxFeOeKhMV3W4HMru9kSYIcxXfbfDRVslLCj_gM'
);

// ── State ──────────────────────────────────────────────────────────
let pendingVideo = null;
let allVideos    = [];
let activeFilter = 'all';

// ── Helpers ────────────────────────────────────────────────────────
function toast(msg, isError = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = isError ? 'error show' : 'show';
  setTimeout(() => { el.className = ''; }, 3000);
}

function extractVideoId(url) {
  url = url.trim();
  // youtu.be/ID
  let m = url.match(/youtu\.be\/([A-Za-z0-9_-]{11})/);
  if (m) return m[1];
  // watch?v=ID
  m = url.match(/[?&]v=([A-Za-z0-9_-]{11})/);
  if (m) return m[1];
  // embed/ID
  m = url.match(/embed\/([A-Za-z0-9_-]{11})/);
  if (m) return m[1];
  // bare 11-char ID
  if (/^[A-Za-z0-9_-]{11}$/.test(url)) return url;
  return null;
}

function todayISO() {
  return new Date().toISOString().split('T')[0];
}

function formatDate(s) {
  if (!s) return '—';
  return new Date(s).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

// ── Fetch video info via oEmbed ────────────────────────────────────
async function fetchVideo() {
  const input   = document.getElementById('url-input');
  const btn     = document.getElementById('btn-fetch');
  const url     = input.value.trim();

  if (!url) { input.focus(); return; }

  const videoId = extractVideoId(url);
  if (!videoId) { toast('Could not extract a video ID from that URL', true); return; }

  btn.disabled = true;
  btn.textContent = 'FETCHING...';

  try {
    const oembedUrl = `https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${videoId}&format=json`;
    const res  = await fetch(oembedUrl);
    if (!res.ok) throw new Error('Video not found or not embeddable');
    const data = await res.json();

    pendingVideo = {
      video_id:      videoId,
      title:         data.title,
      youtube_url:   `https://www.youtube.com/watch?v=${videoId}`,
      thumbnail_url: `https://i.ytimg.com/vi/${videoId}/maxresdefault.jpg`,
      channel:       data.author_name
    };

    // Populate preview
    document.getElementById('preview-img').src      = pendingVideo.thumbnail_url;
    document.getElementById('preview-title').textContent   = data.title;
    document.getElementById('preview-channel').textContent = data.author_name;
    document.getElementById('field-date').value     = todayISO();
    document.getElementById('field-desc').value     = '';
    document.getElementById('field-visible').checked  = true;
    document.getElementById('field-featured').checked = false;
    document.getElementById('field-category').value   = 'sermon';
    document.getElementById('field-order').value      = '0';

    document.getElementById('video-preview').classList.add('visible');

  } catch (err) {
    toast(err.message || 'Could not fetch video info', true);
  } finally {
    btn.disabled = false;
    btn.textContent = 'FETCH VIDEO';
  }
}

// ── Insert video into Supabase ─────────────────────────────────────
async function insertVideo() {
  if (!pendingVideo) return;

  const btn = document.getElementById('btn-insert');
  btn.disabled = true;
  btn.textContent = 'SAVING...';

  const desc     = document.getElementById('field-desc').value.trim();
  const category = document.getElementById('field-category').value;
  const date     = document.getElementById('field-date').value;
  const order    = parseInt(document.getElementById('field-order').value, 10) || 0;
  const visible  = document.getElementById('field-visible').checked;
  const featured = document.getElementById('field-featured').checked;

  // Check if video already exists
  const { data: existing } = await db
    .from('site_youtube')
    .select('id')
    .eq('video_id', pendingVideo.video_id)
    .limit(1);

  if (existing && existing.length > 0) {
    toast('Video already exists in library', true);
    btn.disabled = false;
    btn.textContent = '✓ ADD TO SITE';
    return;
  }

  const { error } = await db.from('site_youtube').insert([{
    video_id:      pendingVideo.video_id,
    title:         pendingVideo.title,
    youtube_url:   pendingVideo.youtube_url,
    thumbnail_url: pendingVideo.thumbnail_url,
    description:   desc || `${pendingVideo.channel} — YouTube`,
    category,
    publish_date:  date || todayISO(),
    display_order: order,
    visible,
    featured,
    notion_page_id: null
  }]);

  if (error) {
    toast('Insert failed: ' + error.message, true);
    btn.disabled = false;
    btn.textContent = '✓ ADD TO SITE';
    return;
  }

  toast('Video added to site');
  resetPreview();
  await loadVideos();
}

function resetPreview() {
  pendingVideo = null;
  document.getElementById('url-input').value = '';
  document.getElementById('video-preview').classList.remove('visible');
  document.getElementById('btn-insert').disabled = false;
  document.getElementById('btn-insert').textContent = '✓ ADD TO SITE';
}

// ── Load all videos ────────────────────────────────────────────────
async function loadVideos() {
  const { data, error } = await db
    .from('site_youtube')
    .select('*')
    .order('publish_date', { ascending: false });

  if (error) {
    document.getElementById('video-list').innerHTML = '<div class="empty-state"><p>Error loading videos</p></div>';
    return;
  }

  allVideos = data || [];
  renderVideos();
}

function setFilter(filter, btn) {
  activeFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderVideos();
}

function renderVideos() {
  let filtered = allVideos;
  if (activeFilter === 'featured') filtered = allVideos.filter(v => v.featured);
  else if (activeFilter === 'hidden') filtered = allVideos.filter(v => !v.visible);
  else if (activeFilter !== 'all') filtered = allVideos.filter(v => v.category === activeFilter);

  document.getElementById('video-count').textContent =
    `${filtered.length} video${filtered.length !== 1 ? 's' : ''} — ${allVideos.length} total`;

  if (!filtered.length) {
    document.getElementById('video-list').innerHTML = '<div class="empty-state"><p>No videos in this filter</p></div>';
    return;
  }

  document.getElementById('video-list').innerHTML = filtered.map(v => `
    <div class="video-card" id="vc-${v.id}">
      <div class="vc-thumb">
        <img src="${v.thumbnail_url}" alt="${v.title}" loading="lazy"
             onerror="this.src='https://i.ytimg.com/vi/${v.video_id}/hqdefault.jpg'">
        <span class="vc-category">${v.category || 'video'}</span>
      </div>
      <div class="vc-info">
        <div class="vc-title">${v.title}</div>
        <div class="vc-meta">
          <span>${formatDate(v.publish_date)}</span>
          <span><a href="${v.youtube_url}" target="_blank" rel="noopener">↗ YouTube</a></span>
          ${v.display_order !== null ? `<span>Order: ${v.display_order}</span>` : ''}
        </div>
      </div>
      <div class="vc-actions">
        <button
          class="vis-badge ${v.visible ? 'visible' : 'hidden'}"
          onclick="toggleField('${v.id}', 'visible', ${!v.visible})"
        >${v.visible ? 'VISIBLE' : 'HIDDEN'}</button>
        <button
          class="feat-badge ${v.featured ? 'featured' : 'unfeatured'}"
          onclick="toggleField('${v.id}', 'featured', ${!v.featured})"
        >${v.featured ? '★ FEATURED' : '☆ FEATURE'}</button>
        <button class="vc-delete" onclick="deleteVideo('${v.id}', '${v.title.replace(/'/g,"\\'")}')">REMOVE</button>
      </div>
    </div>
  `).join('');
}

// ── Toggle visible / featured ──────────────────────────────────────
async function toggleField(id, field, value) {
  const update = {};
  update[field] = value;

  const { error } = await db.from('site_youtube').update(update).eq('id', id);
  if (error) { toast('Update failed', true); return; }

  const v = allVideos.find(x => x.id === id);
  if (v) v[field] = value;
  renderVideos();
  toast(field === 'visible'
    ? (value ? 'Video set to visible' : 'Video hidden from site')
    : (value ? 'Video featured' : 'Feature removed'));
}

// ── Delete video ───────────────────────────────────────────────────
async function deleteVideo(id, title) {
  if (!confirm(`Remove "${title}" from the site?\n\nThis only removes it from the LDW video library — the YouTube video stays up.`)) return;

  const { error } = await db.from('site_youtube').delete().eq('id', id);
  if (error) { toast('Delete failed', true); return; }

  allVideos = allVideos.filter(v => v.id !== id);
  renderVideos();
  toast('Video removed from library');
}

// ── Init ───────────────────────────────────────────────────────────
loadVideos();
</script>
</body>
</html>
